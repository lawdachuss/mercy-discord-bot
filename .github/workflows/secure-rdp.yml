name: Secure RDP + Mercy Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 */6 * * *"

concurrency:
  group: rdp-session
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout bot code
        uses: actions/checkout@v4

      - name: Setup Python with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Restore cached dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            .cache
            C:\rdp-session
          key: rdp-deps-v1-${{ hashFiles('requirements.txt') }}

      - name: Setup RDP + Tailscale + pip
        shell: powershell
        run: |
          $wd = "${{ github.workspace }}"
          Set-Location -LiteralPath $wd

          New-Item -ItemType Directory -Force -Path "C:\rdp-session" | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\.cache" | Out-Null

          $cachedTs = "${{ github.workspace }}\.cache\tailscale.msi"
          $tsJob = $null
          if (Test-Path $cachedTs) {
            Write-Host "=== Tailscale already cached ==="
          } else {
            Write-Host "=== Downloading Tailscale (background, parallel with pip) ==="
            $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
            $tsJob = Start-Job -ScriptBlock { param($u,$o) Invoke-WebRequest -Uri $u -OutFile $o } -ArgumentList $tsUrl, $cachedTs
          }

          Write-Host "=== Configuring RDP ==="
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 1
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Restart-Service TermService -Force

          Write-Host "=== Creating RDP user ==="
          $chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#"
          $password = -join ((1..20) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) { Remove-LocalUser -Name "RDP" }
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          "RDP_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "=== Installing Python dependencies (parallel with Tailscale download) ==="
          python -m pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) { Write-Error "pip install failed"; exit 1 }
          Write-Host "pip install completed."

          Write-Host "=== Verifying discord module ==="
          python -c "import discord; print(f'discord.py {discord.__version__}')"
          if ($LASTEXITCODE -ne 0) { Write-Error "discord not found"; exit 1 }

          if ($tsJob) {
            Write-Host "=== Waiting for Tailscale download ==="
            $tsJob | Wait-Job | Out-Null; $tsJob | Remove-Job
          }

          if (-not (Test-Path "$env:ProgramFiles\Tailscale\tailscale.exe")) {
            Write-Host "=== Installing Tailscale ==="
            Start-Process msiexec.exe -ArgumentList "/i `"$cachedTs`" /qn /norestart" -Wait
          } else {
            Write-Host "=== Tailscale already installed ==="
          }
          Write-Host "Setup complete."

      - name: Finalize Setup (session metadata + user dirs)
        shell: powershell
        run: |

          Write-Host "=== Loading session metadata ==="
          $cacheFile = "C:\rdp-session\session.json"
          if (Test-Path $cacheFile) {
            $s = Get-Content $cacheFile | ConvertFrom-Json
            $runCount = $s.run_count; $createdAt = $s.created_at
          } else {
            $runCount = 0; $createdAt = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          }
          "CACHED_RUN_COUNT=$runCount"   | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CACHED_CREATED_AT=$createdAt" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Session: #$runCount | Created: $createdAt"

          $rdpHome = "C:\Users\RDP"
          if (-not (Test-Path $rdpHome)) {
            New-Item -ItemType Directory -Force -Path $rdpHome | Out-Null
          }
          @("Desktop","Documents","Downloads","Pictures","Videos","Music") | ForEach-Object {
            $p = "$rdpHome\$_"
            if (-not (Test-Path $p)) { New-Item -ItemType Directory -Force -Path $p | Out-Null }
          }

      - name: Connect Tailscale
        shell: powershell
        run: |
          $tailscale = "$env:ProgramFiles\Tailscale\tailscale.exe"
          $hostname  = "mercy-bot-${{ github.run_id }}"

          Start-Service Tailscale
          Start-Sleep -Seconds 5

          & $tailscale up --authkey="${{ secrets.TAILSCALE_KEY }}" --hostname="$hostname" --accept-routes --reset
          if ($LASTEXITCODE -ne 0) { Write-Error "Tailscale failed"; exit 1 }

          $ip = $null
          for ($i = 0; $i -lt 20; $i++) {
            try { $ip = (& $tailscale ip -4 | Select-Object -First 1).Trim() } catch {}
            if ($ip) { break }
            Start-Sleep -Seconds 3
          }
          if (-not $ip) { Write-Error "No Tailscale IP assigned"; exit 1 }

          "TAILSCALE_IP=$ip"      | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TS_HOSTNAME=$hostname" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Tailscale IP: $ip"

      - name: Start Mercy Bot + Keep Alive
        shell: powershell
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
          OWNER_IDS: ${{ secrets.OWNER_IDS }}
          AUTO_SYNC_COMMANDS: "true"
        run: |
          $wd = "${{ github.workspace }}"

          $job = Start-Job -Name "mercybot" -ScriptBlock {
            param($wd, $token, $webhook, $mongo, $owners)
            Set-Location -LiteralPath $wd
            $env:DISCORD_TOKEN = $token
            $env:WEBHOOK_URL = $webhook
            $env:MONGO_URL = $mongo
            $env:OWNER_IDS = $owners
            $env:AUTO_SYNC_COMMANDS = "true"
            python -u main.py
          } -ArgumentList $wd, $env:DISCORD_TOKEN, $env:WEBHOOK_URL, $env:MONGO_URL, $env:OWNER_IDS

          Start-Sleep -Seconds 15

          # Show initial bot output
          $initialOutput = Receive-Job $job -ErrorAction SilentlyContinue
          if ($initialOutput) { Write-Host $initialOutput }

          if ($job.State -eq "Failed") {
            Write-Host "::error::Bot job failed"
            Receive-Job $job -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
            exit 1
          }
          if ($job.State -eq "Completed") {
            Write-Host "::error::Bot exited too early"
            Receive-Job $job -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
            exit 1
          }

          # Show connection details once
          $runCount = [int]$env:CACHED_RUN_COUNT + 1
          Write-Host ""
          Write-Host "======================================="
          Write-Host "        MERCY BOT + RDP READY"
          Write-Host "======================================="
          Write-Host "Tailscale IP : $env:TAILSCALE_IP"
          Write-Host "Username     : RDP"
          Write-Host "Password     : $env:RDP_PASSWORD"
          Write-Host "Session #    : $runCount"
          Write-Host "Bot PID      : (see job output above)"
          Write-Host "======================================="

          # Keep Alive: stream bot output + keep runner alive
          $endTime = (Get-Date).AddMinutes(345)
          while ((Get-Date) -lt $endTime) {
            $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            $output = Receive-Job $job -ErrorAction SilentlyContinue
            if ($output) { $output | ForEach-Object { Write-Host $_ } }

            if ($job.State -eq "Failed") {
              Write-Host "::error::Bot crashed"
              Receive-Job $job -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_ }
              exit 1
            }
            if ($job.State -eq "Completed") {
              Write-Host "Bot exited gracefully."
              exit 0
            }

            Write-Host "[$ts] Bot alive (PID via job)..."
            Start-Sleep -Seconds 30
          }

      - name: Save Session Metadata
        if: always()
        shell: powershell
        run: |
          $runCount = [int]$env:CACHED_RUN_COUNT + 1
          New-Item -ItemType Directory -Force -Path "C:\rdp-session" | Out-Null
          $now = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          $createdAt = $env:CACHED_CREATED_AT
          if (-not $createdAt) { $createdAt = $now }
          @{
            hostname     = "$env:TS_HOSTNAME"
            tailscale_ip = "$env:TAILSCALE_IP"
            run_count    = $runCount
            created_at   = $createdAt
            last_run_at  = $now
            last_run_id  = "${{ github.run_id }}"
          } | ConvertTo-Json | Set-Content "C:\rdp-session\session.json" -Encoding utf8
          Write-Host "Session saved. Total: $runCount"
