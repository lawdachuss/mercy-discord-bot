name: Secure RDP + Mercy Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout bot code
        uses: actions/checkout@v4

      - name: Setup RDP + Tailscale + pip (parallel)
        shell: powershell
        run: |
          $wd = "${{ github.workspace }}"
          Set-Location -LiteralPath $wd
          Write-Host "=== Starting pip install in background ==="
          $pipProc = Start-Process -FilePath pip -ArgumentList "install -r requirements.txt" -NoNewWindow -PassThru -RedirectStandardOutput "pip_stdout.log" -RedirectStandardError "pip_stderr.log"
          "PIP_PID=$($pipProc.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "pip started (PID: $($pipProc.Id))."

          Write-Host "=== Setting up directories ==="
          New-Item -ItemType Directory -Force -Path "C:\rdp-session" | Out-Null

          Write-Host "=== Downloading Tailscale ==="
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $tsInstaller = "$env:TEMP\tailscale.msi"
          $tsJob = Start-Job -ScriptBlock { param($u,$o) Invoke-WebRequest -Uri $u -OutFile $o } -ArgumentList $tsUrl, $tsInstaller

          Write-Host "=== Configuring RDP ==="
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 1
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Restart-Service TermService -Force

          Write-Host "=== Creating RDP user ==="
          $chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#"
          $password = -join ((1..20) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) { Remove-LocalUser -Name "RDP" }
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          "RDP_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "=== Waiting for Tailscale download ==="
          $tsJob | Wait-Job | Out-Null; $tsJob | Remove-Job

          Write-Host "=== Installing Tailscale ==="
          Start-Process msiexec.exe -ArgumentList "/i `"$tsInstaller`" /qn /norestart" -Wait
          Remove-Item $tsInstaller -Force -ErrorAction SilentlyContinue
          Write-Host "RDP + Tailscale ready. pip still installing in background."

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Finalize Setup (pip check + env + session)
        shell: powershell
        run: |
          Write-Host "=== Waiting for pip install ==="
          $pipProc = Get-Process -Id $env:PIP_PID -ErrorAction SilentlyContinue
          if ($pipProc) {
            $pipProc.WaitForExit()
            if ($pipProc.ExitCode -ne 0) {
              Write-Host "::error::pip install failed (exit $($pipProc.ExitCode))"
              Get-Content "pip_stderr.log" -ErrorAction SilentlyContinue
              exit 1
            }
            Remove-Variable pipProc
          } else {
            Write-Host "pip already finished."
            $pipLog = Get-Content "pip_stdout.log" -ErrorAction SilentlyContinue
            if ($pipLog -match "error|failed") {
              Write-Host "::error::pip may have failed. Check logs."
              Get-Content "pip_stderr.log" -ErrorAction SilentlyContinue
            }
          }
          Write-Host "pip install completed."

          Write-Host "=== Loading session metadata ==="
          $cacheFile = "C:\rdp-session\session.json"
          if (Test-Path $cacheFile) {
            $s = Get-Content $cacheFile | ConvertFrom-Json
            $runCount = $s.run_count; $createdAt = $s.created_at
          } else {
            $runCount = 0; $createdAt = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          }
          "CACHED_RUN_COUNT=$runCount"   | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CACHED_CREATED_AT=$createdAt" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Session: #$runCount | Created: $createdAt"

          $rdpHome = "C:\Users\RDP"
          if (-not (Test-Path $rdpHome)) {
            New-Item -ItemType Directory -Force -Path $rdpHome | Out-Null
          }
          @("Desktop","Documents","Downloads","Pictures","Videos","Music") | ForEach-Object {
            $p = "$rdpHome\$_"
            if (-not (Test-Path $p)) { New-Item -ItemType Directory -Force -Path $p | Out-Null }
          }

      - name: Connect Tailscale
        shell: powershell
        run: |
          $tailscale = "$env:ProgramFiles\Tailscale\tailscale.exe"
          $hostname  = "mercy-bot-${{ github.run_id }}"

          Start-Service Tailscale
          Start-Sleep -Seconds 5

          & $tailscale up --authkey="${{ secrets.TAILSCALE_KEY }}" --hostname="$hostname" --accept-routes --reset
          if ($LASTEXITCODE -ne 0) { Write-Error "Tailscale failed"; exit 1 }

          $ip = $null
          for ($i = 0; $i -lt 20; $i++) {
            try { $ip = (& $tailscale ip -4 | Select-Object -First 1).Trim() } catch {}
            if ($ip) { break }
            Start-Sleep -Seconds 3
          }
          if (-not $ip) { Write-Error "No Tailscale IP assigned"; exit 1 }

          "TAILSCALE_IP=$ip"      | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TS_HOSTNAME=$hostname" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Tailscale IP: $ip"

      - name: Start Mercy Bot
        shell: powershell
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
          OWNER_IDS: ${{ secrets.OWNER_IDS }}
          AUTO_SYNC_COMMANDS: "true"
        run: |
          $wd = "${{ github.workspace }}"
          Set-Location -LiteralPath $wd
          $env:PYTHONIOENCODING = 'utf-8'

          $proc = Start-Process -FilePath python -ArgumentList "-u main.py" -NoNewWindow -PassThru -RedirectStandardOutput "bot_stdout.log" -RedirectStandardError "bot_stderr.log"
          "BOT_PID=$($proc.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Bot started (PID: $($proc.Id)). Waiting 8s for startup..."

          Start-Sleep -Seconds 8

          if ($proc.HasExited) {
            Write-Host "::error::Bot exited with code $($proc.ExitCode)"
            Write-Host "=== STDERR ==="
            Get-Content "bot_stderr.log" -ErrorAction SilentlyContinue
            Write-Host "=== STDOUT ==="
            Get-Content "bot_stdout.log" -ErrorAction SilentlyContinue
            exit 1
          }

          Write-Host "Bot is running."
          $log = Get-Content "bot_stdout.log" -ErrorAction SilentlyContinue
          if ($log) { Write-Host "=== Startup ==="; $log | Select-Object -Last 10 }

      - name: Verify RDP and Show Connection Details
        shell: powershell
        run: |
          $rdpOk = $false
          for ($i = 0; $i -lt 10; $i++) {
            $test = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue
            if ($test.TcpTestSucceeded) { $rdpOk = $true; break }
            Start-Sleep -Seconds 3
          }

          $runCount = [int]$env:CACHED_RUN_COUNT + 1
          Write-Host ""
          Write-Host "======================================="
          Write-Host "        MERCY BOT + RDP READY"
          Write-Host "======================================="
          Write-Host "Tailscale IP : $env:TAILSCALE_IP"
          Write-Host "Username     : RDP"
          Write-Host "Password     : $env:RDP_PASSWORD"
          Write-Host "Session #    : $runCount"
          Write-Host "Bot running  : YES"
          Write-Host "Bot logs     : bot_stdout.log / bot_stderr.log"
          Write-Host "======================================="

      - name: Keep Alive
        shell: powershell
        run: |
          $endTime = (Get-Date).AddMinutes(345)
          while ((Get-Date) -lt $endTime) {
            $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            Write-Host "[$ts] Runner active... (bot running in background)"
            Start-Sleep -Seconds 60
          }

      - name: Save Session Metadata
        if: always()
        shell: powershell
        run: |
          $runCount = [int]$env:CACHED_RUN_COUNT + 1
          New-Item -ItemType Directory -Force -Path "C:\rdp-session" | Out-Null
          $now = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          $createdAt = $env:CACHED_CREATED_AT
          if (-not $createdAt) { $createdAt = $now }
          @{
            hostname     = "$env:TS_HOSTNAME"
            tailscale_ip = "$env:TAILSCALE_IP"
            run_count    = $runCount
            created_at   = $createdAt
            last_run_at  = $now
            last_run_id  = "${{ github.run_id }}"
          } | ConvertTo-Json | Set-Content "C:\rdp-session\session.json" -Encoding utf8
          Write-Host "Session saved. Total: $runCount"
