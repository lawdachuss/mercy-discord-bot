name: Deploy Lavalink

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  lavalink:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore cached dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            lavalink/Lavalink.jar
            lavalink/plugins
            .cache
          key: lavalink-deps-v2-${{ hashFiles('lavalink/application.yml') }}

      - name: Download & cache dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\.cache" | Out-Null

          Write-Host "Downloading Lavalink 4.2.2 (~100MB)..."
          $lavalinkUrl = "https://github.com/lavalink-devs/Lavalink/releases/download/4.2.2/Lavalink.jar"
          curl.exe -L -o "${{ github.workspace }}\lavalink\Lavalink.jar" $lavalinkUrl
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\lavalink\plugins" | Out-Null

          Write-Host "Downloading yt-dlp..."
          curl.exe -L -o "${{ github.workspace }}\.cache\yt-dlp.exe" "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe"

          Write-Host "Downloading Tailscale..."
          curl.exe -L -o "${{ github.workspace }}\.cache\tailscale.msi" "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"

          Write-Host "All dependencies cached"

      - name: Install yt-dlp
        shell: powershell
        run: |
          $cached = "${{ github.workspace }}\.cache\yt-dlp.exe"
          if (Test-Path $cached) {
            New-Item -ItemType Directory -Force "$env:USERPROFILE\.local\bin" | Out-Null
            Copy-Item $cached "$env:USERPROFILE\.local\bin\yt-dlp.exe" -Force
            $env:Path += ";$env:USERPROFILE\.local\bin"
            [Environment]::SetEnvironmentVariable("Path", $env:Path, "User")
          }
          Write-Host "yt-dlp: $(yt-dlp --version 2>$null)"

      - name: Install Tailscale
        shell: powershell
        run: |
          if (Test-Path "$env:ProgramFiles\Tailscale\tailscale.exe") {
            Write-Host "Tailscale already installed, skipping"
          } else {
            $cached = "${{ github.workspace }}\.cache\tailscale.msi"
            if (Test-Path $cached) {
              Write-Host "Installing Tailscale from cache..."
              Start-Process msiexec.exe -ArgumentList "/i `"$cached`" /qn /norestart" -Wait
            } else {
              Write-Host "Downloading and installing Tailscale..."
              $tsInstaller = "$env:TEMP\tailscale.msi"
              Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $tsInstaller
              Start-Process msiexec.exe -ArgumentList "/i `"$tsInstaller`" /qn /norestart" -Wait
              Remove-Item $tsInstaller -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Connect Tailscale
        shell: powershell
        run: |
          $tailscale = "$env:ProgramFiles\Tailscale\tailscale.exe"
          $hostname  = "lavalink-${{ github.run_id }}"

          Start-Service Tailscale
          Start-Sleep -Seconds 5

          & $tailscale up --authkey="${{ secrets.TAILSCALE_KEY }}" --hostname="$hostname" --accept-routes --reset
          if ($LASTEXITCODE -ne 0) { Write-Error "Tailscale failed"; exit 1 }

          $ip = $null
          for ($i = 0; $i -lt 20; $i++) {
            try { $ip = (& $tailscale ip -4 | Select-Object -First 1).Trim() } catch {}
            if ($ip) { break }
            Start-Sleep -Seconds 3
          }
          if (-not $ip) { Write-Error "No Tailscale IP assigned"; exit 1 }

          "TAILSCALE_IP=$ip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Tailscale IP: $ip"

      - name: Open firewall for Lavalink
        shell: powershell
        run: |
          netsh advfirewall set allprofiles state off
          Write-Host "Windows Firewall disabled on all profiles"
          Write-Host "IP config:"
          ipconfig | Select-String "Tailscale|IPv4"

      - name: Start Lavalink server
        shell: powershell
        run: |
          $lavalinkDir = "${{ github.workspace }}\lavalink"
          $lavalinkJob = Start-Job -Name "lavalink" -ScriptBlock {
            param($dir)
            Set-Location -LiteralPath $dir
            java -jar Lavalink.jar
          } -ArgumentList $lavalinkDir

          $hostUrl = "http://127.0.0.1:2333"
          $headers = @{ Authorization = "youshallnotpass" }
          for ($i = 0; $i -lt 20; $i++) {
            Start-Sleep -Seconds 10
            $output = Receive-Job $lavalinkJob -ErrorAction SilentlyContinue
            if ($output) { Write-Host $output }

            if ($lavalinkJob.State -eq "Failed") {
              Write-Error "Lavalink process failed"
              exit 1
            }

            try {
              $version = Invoke-RestMethod -Uri "$hostUrl/version" -TimeoutSec 8 -Headers $headers -ErrorAction Stop
              Write-Host "Lavalink ready! Version: $version"
              $info = Invoke-RestMethod -Uri "$hostUrl/v4/info" -TimeoutSec 8 -Headers $headers -ErrorAction Stop
              $info.plugins | ForEach-Object { Write-Host "  Plugin: $($_.name) v$($_.version)" }
              $lavalinkJob | Out-Null
              break
            } catch {
              if ($i -eq 19) {
                Write-Error "Lavalink failed to start within 200s"
                exit 1
              }
              Write-Host "Waiting for Lavalink... ($(($i+1)*10)s)"
            }
          }

      - name: Keep Lavalink alive
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "======================================="
          Write-Host "        LAVALINK DEPLOYED"
          Write-Host "======================================="
          Write-Host "Tailscale IP : $env:TAILSCALE_IP"
          Write-Host "Port         : 2333"
          Write-Host "Password     : youshallnotpass"
          Write-Host "======================================="
          Write-Host "Use these in your local .env:"
          Write-Host "  LAVALINK_HOST=$env:TAILSCALE_IP"
          Write-Host "  LAVALINK_PORT=2333"
          Write-Host "  LAVALINK_PASSWORD=youshallnotpass"
          Write-Host "======================================="
          Write-Host ""

          $endTime = (Get-Date).AddMinutes(345)
          while ((Get-Date) -lt $endTime) {
            $ts = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            Write-Host "[$ts] Lavalink alive | $env:TAILSCALE_IP:2333"
            Start-Sleep -Seconds 60
          }
